<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benjamin Franklin Plumbing – Big Board</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:      #1A6DB5;
    --primary-light:#2B8FE8;
    --primary-dark: #0F4A80;
    --bg:           #EEF4FA;
    --surface:      #FFFFFF;
    --surface2:     #E4EDF6;
    --border:       #C0D0E4;
    --text:         #0D1F35;
    --muted:        #5A7A9A;
    --blue:         #1A6DB5;
    --red:          #C0392B;
    --gold:         #B45309;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); }

  #scaler { width:1920px; height:1080px; transform-origin:top left; position:absolute; top:0; left:0; }

  .wrapper {
    width:1920px; height:1080px;
    display:flex; flex-direction:column;
    padding:16px 26px 14px; gap:10px;
    background:var(--bg);
    position:relative;
  }
  .wrapper::before {
    content:''; position:absolute; top:0; left:0; right:0; height:6px;
    background:linear-gradient(90deg,#0F4A80,#1A6DB5,#2B8FE8,#1A6DB5,#0F4A80);
  }

  /* HEADER */
  header {
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
    background:var(--surface);
    border-radius:12px;
    padding:10px 22px;
    border:1px solid var(--border);
    box-shadow:0 2px 8px rgba(26,109,181,.08);
  }
  .logo-area { display:flex; align-items:center; gap:12px; }
  .logo-img  { height:64px; width:auto; object-fit:contain; }
  .company-name { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:3px; color:var(--primary-dark); }
  .company-sub  { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:1px; }

  .header-center { text-align:center; }
  .header-date { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; color:var(--primary-dark); }
  .header-day  { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }

  .header-right { display:flex; align-items:center; gap:14px; }
  .legend       { display:flex; align-items:center; gap:12px; font-size:12px; color:var(--muted); font-weight:600; }
  .legend-item  { display:flex; align-items:center; gap:5px; }
  .legend-dot   { width:10px; height:10px; border-radius:50%; }
  .live-badge   { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 16px; font-size:12px; color:var(--muted); font-weight:500; }
  .pulse { width:8px; height:8px; background:var(--blue); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  /* SUMMARY BAR */
  .summary-bar { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; flex-shrink:0; }
  .sum-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; position:relative; overflow:hidden; box-shadow:0 1px 4px rgba(26,109,181,.05); }
  .sum-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--accent,var(--primary)); }
  .sum-card.blue   { --accent:var(--primary-light); }
  .sum-card.pos-c  { --accent:var(--blue); }
  .sum-card.neg-c  { --accent:var(--red); }
  .sum-card.gold   { --accent:var(--gold); }
  .sum-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; font-weight:700; }
  .sum-value { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:.5px; line-height:1; color:var(--text); }
  .sum-value.pos { color:var(--blue); }
  .sum-value.neg { color:var(--red); }
  .sum-sub   { font-size:10px; color:var(--muted); margin-top:2px; font-weight:500; }

  /* TABLE */
  .table-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 2px 8px rgba(26,109,181,.06); }
  .table-header { display:flex; align-items:center; justify-content:space-between; padding:9px 20px; border-bottom:2px solid var(--border); flex-shrink:0; background:var(--surface2); }
  .table-title  { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; color:var(--primary-dark); }
  .month-tag    { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--primary); background:#DBEAFE; border:1px solid #BFDBFE; padding:3px 12px; border-radius:20px; font-weight:700; }
  .scroll-info  { font-size:11px; color:var(--primary); font-weight:700; letter-spacing:1px; }

  /* Fixed header sits above the scroll viewport, never moves */
  .table-head-wrap { flex-shrink:0; overflow:hidden; background:var(--surface); }
  .table-head-wrap table { width:100%; border-collapse:collapse; table-layout:fixed; }

  /* PAGED DISPLAY — no scrolling */
  .page-viewport { flex:1; overflow:hidden; position:relative; }
  .page-view {
    position:absolute; top:0; left:0; right:0; bottom:0;
    opacity:0; transition:opacity 0.8s ease;
    pointer-events:none;
  }
  .page-view.active { opacity:1; pointer-events:all; }
  .page-indicator {
    display:flex; align-items:center; gap:8px;
    font-size:11px; color:var(--primary); font-weight:700; letter-spacing:1px;
  }
  .page-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--border); transition:background .3s;
  }
  .page-dot.active { background:var(--primary); }
  /* Progress bar showing time until page switch */
  .page-progress {
    position:absolute; bottom:0; left:0; right:0; height:3px;
    background:var(--border);
  }
  .page-progress-fill {
    height:100%; background:var(--primary);
    transition:width linear;
  }
  /* Body table must match header column widths exactly */
  .scroll-track table { width:100%; border-collapse:collapse; table-layout:fixed; }

  table { width:100%; border-collapse:collapse; }
  thead th { background:var(--surface); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:7px 10px; text-align:right; font-weight:700; border-bottom:1px solid var(--border); white-space:nowrap; overflow:hidden; }
  thead th:first-child  { text-align:center; width:54px; padding-left:16px; }
  thead th:nth-child(2) { text-align:left; min-width:185px; }
  thead th.wk   { color:var(--primary); }
  thead th.wkc  { color:#fff; background:#1A6DB5; border-bottom:2px solid #0F4A80; }
  thead th.ytdc { color:var(--gold); }
  /* Current week column cells */
  td.cur-wk { background:rgba(26,109,181,0.08); border-left:2px solid rgba(26,109,181,0.25); border-right:2px solid rgba(26,109,181,0.25); }
  /* Body td widths must mirror th widths */
  tbody td { overflow:hidden; }

  tbody tr:nth-child(even) { background:#F0F6FC; }
  tbody tr:nth-child(odd)  { background:var(--surface); }
  tbody tr { border-bottom:1px solid #DDE8F4; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#E6F0FB; transition:background .1s; }

  td { padding:7px 10px; font-size:13px; text-align:right; vertical-align:middle; }
  td:first-child  { text-align:center; padding-left:16px; }
  td:nth-child(2) { text-align:left; }

  .rank-badge { font-family:'Bebas Neue',sans-serif; font-size:16px; }
  .r1 { color:#B45309; text-shadow:0 1px 2px rgba(180,83,9,.2); }
  .r2 { color:#4B5563; text-shadow:0 1px 2px rgba(0,0,0,.1); }
  .r3 { color:#92400E; text-shadow:0 1px 2px rgba(146,64,14,.2); }
  .ro { color:var(--muted); font-size:13px; }

  /* TECH CELL */
  .tech-cell { display:flex; align-items:center; gap:10px; }
  .avatar    { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .tname { font-weight:700; font-size:13px; color:var(--text); display:block; line-height:1.2; }
  .tgoal { font-size:10px; color:var(--muted); font-weight:500; display:block; }

  /* VALUE CELLS — font color only, no background */
  .val-over  { color:var(--blue); font-weight:700; }
  .val-under { color:var(--red);  font-weight:700; }
  .val-muted { color:var(--muted); font-weight:400; }

  .cell-wrap { display:inline-flex; flex-direction:column; align-items:flex-end; gap:1px; }
  .cell-main { font-size:13px; }
  .cell-sub  { font-size:9px; color:var(--muted); }

  .mrev-main { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.5px; }
  .ytd-main  { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:.5px; }
  .conv-main { font-size:12px; font-weight:700; }

  /* FOOTER */
  footer { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:0 4px; }
  .footer-note { font-size:11px; color:var(--muted); font-weight:500; }
  .powered     { font-size:11px; color:var(--muted); font-weight:500; }
  .powered span{ color:var(--primary); font-weight:700; }
</style>
</head>

  </footer>

</div>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwgwzczbRyvLDdEkwH8_qhb_8Ac3SJwSZQU_6ta-_g93QR-DRtjxLVrTmUhqcTUXxwdUg/exec";
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS  =["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const COLORS=["#1A6DB5","#0369A1","#15803D","#B45309","#9333EA","#C2410C","#0E7490","#BE185D","#4D7C0F","#4338CA","#0F766E","#6D28D9","#B91C1C","#0C4A6E","#166534"];

// AUTO-SCALE
function scaleToScreen(){
  const s=document.getElementById('scaler');
  const sx=window.innerWidth/1920, sy=window.innerHeight/1080;
  const sc=Math.min(sx,sy);
  s.style.transform=`scale(${sc})`;
  s.style.left=((window.innerWidth -1920*sc)/2)+'px';
  s.style.top =((window.innerHeight-1080*sc)/2)+'px';
}
scaleToScreen();
window.addEventListener('resize',scaleToScreen);

// HOLIDAYS
function observedDate(y,m,d){const dt=new Date(y,m,d),dow=dt.getDay();if(dow===6)return new Date(y,m,d-1);if(dow===0)return new Date(y,m,d+1);return dt;}
function memorialDay(y){let d=new Date(y,4,31);while(d.getDay()!==1)d.setDate(d.getDate()-1);return d;}
function laborDay(y){let d=new Date(y,8,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);return d;}
function thanksgiving(y){let d=new Date(y,10,1),n=0;while(n<4){if(d.getDay()===4)n++;if(n<4)d.setDate(d.getDate()+1);}return d;}
function getHolidayMap(y){
  const m=new Map();
  [[observedDate(y,0,1),"New Year's"],[memorialDay(y),"Memorial Day"],[observedDate(y,6,4),"Independence Day"],
   [laborDay(y),"Labor Day"],[thanksgiving(y),"Thanksgiving"],[observedDate(y,11,25),"Christmas"]
  ].forEach(([d,n])=>m.set(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`,n));
  return m;
}
function dk(d){return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function isWknd(d){return d.getDay()===0||d.getDay()===6;}
function isWorkDay(d,hm){return !isWknd(d)&&!hm.has(dk(d));}

// WEEKS
function getWeeksForMonth(year,month){
  const weeks=[],dim=new Date(year,month+1,0).getDate();let wd=[];
  for(let day=1;day<=dim;day++){
    const d=new Date(year,month,day);
    if(d.getDay()===0&&wd.length>0){weeks.push({weekNum:weeks.length+1,dates:wd});wd=[];}
    wd.push(d);
  }
  if(wd.length>0)weeks.push({weekNum:weeks.length+1,dates:wd});
  return weeks;
}
function countWorkDays(dates,hm,cutoff){return dates.filter(d=>{if(!isWorkDay(d,hm))return false;if(cutoff!==null&&d>cutoff)return false;return true;}).length;}
function holsInWeek(dates,hm){return dates.filter(d=>hm.has(dk(d))&&!isWknd(d)).map(d=>hm.get(dk(d)));}
function getCurWkIdx(weeks,today){for(let i=0;i<weeks.length;i++)if(today>=weeks[i].dates[0]&&today<=weeks[i].dates[weeks[i].dates.length-1])return i;return -1;}

// YTD
function countYTDWorkDays(startDateStr,holMap,year){
  if(!startDateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const jan1=new Date(year,0,1);
  const start=new Date(startDateStr);start.setHours(0,0,0,0);
  const from=start>jan1?start:jan1;
  if(from>today)return 0;
  let count=0;const cur=new Date(from);
  while(cur<=today){if(isWorkDay(cur,holMap))count++;cur.setDate(cur.getDate()+1);}
  return count;
}
function countWorkDaysInYear(holMap,year,upToToday){
  const start=new Date(year,0,1);
  const end=upToToday?new Date():new Date(year,11,31);
  end.setHours(0,0,0,0);
  let count=0;const cur=new Date(start);
  while(cur<=end){if(isWorkDay(cur,holMap))count++;cur.setDate(cur.getDate()+1);}
  return count;
}

function initials(n){return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function fmtK(n){return n>=1e6?'$'+(n/1e6).toFixed(2)+'M':'$'+(n/1e3).toFixed(0)+'K';}
function ordinal(n){if(n===1)return'1st';if(n===2)return'2nd';if(n===3)return'3rd';return n+'th';}

// ── LIVE DATA STATE ──
// Populated by fetchBoardData() from Google Sheet
let liveData = {
  techs:    [],
  settings: { annualGoal:0, convGoal:65, monthlyGoals:{}, companyYTD:0, companyMonthly:0 },
  lastSync: null,
  loaded:   false,
};

// ── FETCH LIVE DATA FROM GOOGLE SHEET ──
async function fetchBoardData() {
  if (!SHEET_URL || SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    console.warn('SHEET_URL not configured — using localStorage fallback');
    loadFromLocalStorage();
    return;
  }
  try {
    const res  = await fetch(SHEET_URL + '?action=getBoardData');
    const data = await res.json();
    if (data.status === 'ok') {
      liveData.techs    = data.techs    || [];
      liveData.settings = data.settings || { annualGoal:0, convGoal:65 };
      liveData.lastSync = data.lastSync;
      liveData.loaded   = true;
      document.getElementById('footerNote').textContent =
        '⟳ Last sync: ' + (data.lastSync ? new Date(data.lastSync).toLocaleTimeString() : 'Unknown') +
        '  ·  Source: ServiceTitan & Google Sheets';
    } else {
      console.warn('getBoardData error:', data.message);
      loadFromLocalStorage();
    }
  } catch(err) {
    console.warn('Fetch failed, using localStorage fallback:', err);
    loadFromLocalStorage();
  }
}

// Fallback — use localStorage data if sheet unavailable
function loadFromLocalStorage() {
  const stored = JSON.parse(localStorage.getItem('bfp_techs') || '[]');
  liveData.techs = stored.filter(t => t.shown).map(t => ({
    ...t,
    monthlyRev: 0,
    ytdRev:     0,
  }));
  liveData.settings = {
    annualGoal: parseFloat(localStorage.getItem('bfp_annual_goal')) || 0,
    convGoal:   parseFloat(localStorage.getItem('bfp_conv_goal'))   || 65,
  };
  liveData.loaded = true;
}

// ── PAGE ROTATION ──
const PAGE1_DURATION = 30000; // 30 seconds on page 1
const PAGE2_DURATION = 15000; // 15 seconds on page 2
const FADE_DURATION  = 800;   // 0.8s fade transition
const MAX_PAGE1      = 12;    // show all on page 1 if 12 or fewer techs

let currentPage    = 1;
let totalPages     = 1;
let pageTimer      = null;
let progressTimer  = null;
let progressStart  = null;
let progressDuration = PAGE1_DURATION;

function startPageRotation(numTechs) {
  totalPages = numTechs > MAX_PAGE1 ? 2 : 1;

  // Show/hide page 2 dot
  const dot2 = document.getElementById('dot2');
  if (dot2) dot2.style.display = totalPages > 1 ? 'block' : 'none';

  if (totalPages === 1) {
    updatePageIndicator();
    return; // No rotation needed
  }

  // Start on page 1
  showPage(1);
  scheduleNextPage();
}

function scheduleNextPage() {
  if (pageTimer) clearTimeout(pageTimer);
  const duration = currentPage === 1 ? PAGE1_DURATION : PAGE2_DURATION;
  progressDuration = duration;
  startProgressBar(duration);
  pageTimer = setTimeout(function() {
    const nextPage = currentPage === 1 ? 2 : 1;
    showPage(nextPage);
    scheduleNextPage();
  }, duration);
}

function showPage(pageNum) {
  currentPage = pageNum;

  const p1 = document.getElementById('page1');
  const p2 = document.getElementById('page2');

  if (pageNum === 1) {
    if (p1) p1.classList.add('active');
    if (p2) p2.classList.remove('active');
  } else {
    if (p2) p2.classList.add('active');
    if (p1) p1.classList.remove('active');
  }

  updatePageIndicator();
}

function updatePageIndicator() {
  const label = document.getElementById('pageLabel');
  const dot1  = document.getElementById('dot1');
  const dot2  = document.getElementById('dot2');

  if (label) {
    label.textContent = totalPages > 1
      ? `Page ${currentPage} of ${totalPages}`
      : '';
  }
  if (dot1) dot1.classList.toggle('active', currentPage === 1);
  if (dot2) dot2.classList.toggle('active', currentPage === 2);
}

function startProgressBar(duration) {
  if (progressTimer) cancelAnimationFrame(progressTimer);
  const fill = document.getElementById('pageProgressFill');
  if (!fill) return;
  progressStart = Date.now();

  function step() {
    const elapsed = Date.now() - progressStart;
    const pct = Math.min(100, (elapsed / duration) * 100);
    fill.style.width = pct + '%';
    if (pct < 100) progressTimer = requestAnimationFrame(step);
  }
  fill.style.width = '0%';
  fill.style.transition = 'none';
  progressTimer = requestAnimationFrame(step);
}

// ── RENDER ──
function render(){
  if (!liveData.loaded) return; // wait for data

  const today=new Date();today.setHours(0,0,0,0);
  const year=today.getFullYear(),month=today.getMonth();
  const holMap=getHolidayMap(year);
  const weeks=getWeeksForMonth(year,month);
  const curWkIdx=getCurWkIdx(weeks,today);

  const annualGoal = liveData.settings.annualGoal || 0;
  const convGoal   = liveData.settings.convGoal   || 65;

  document.getElementById('dateMain').textContent=`${MONTHS[month]} ${today.getDate()}, ${year}`;
  document.getElementById('dateSub').textContent=DAYS[today.getDay()];
  document.getElementById('monthTag').textContent=MONTHS[month]+' '+year;

  // ── COMPANY TOTALS from ST (all completed jobs, not just soldById) ──
  const coYTDRev     = liveData.settings.companyYTD     || liveData.techs.reduce((s,t) => s + (t.ytdRev||0),     0);
  const coMonthlyRev = liveData.settings.companyMonthly || liveData.techs.reduce((s,t) => s + (t.monthlyRev||0), 0);

  // Monthly goal — use the specific monthly goal from Admin App settings
  const monthNum = month + 1; // 1-based
  const monthlyGoals = liveData.settings.monthlyGoals || {};
  const coMonthlyGoal = monthlyGoals[monthNum] || monthlyGoals[monthNum.toString()] || 0;

  // YTD projected
  const elWD     = countWorkDaysInYear(holMap, year, true);
  const totWD    = countWorkDaysInYear(holMap, year, false);
  const dailyAvg = elWD > 0 ? coYTDRev / elWD : 0;
  const ytdProj  = Math.round(dailyAvg * totWD);
  const projVsGoal = annualGoal > 0 ? ytdProj - annualGoal : null;

  // Monthly diff
  const mDiff = coMonthlyRev - coMonthlyGoal;

  // ── SUMMARY BAR ──
  const sb=document.getElementById('summaryBar');sb.innerHTML='';
  [
    {label:'Annual Goal',    value:annualGoal?fmtK(annualGoal):'Not set', cls:'blue'},
    {label:'YTD Revenue',    value:fmtK(coYTDRev), cls:''},
    {label:'YTD Projected',  value:fmtK(ytdProj),
     cls:projVsGoal===null?'':projVsGoal>=0?'pos-c':'neg-c',
     vc:projVsGoal===null?'':projVsGoal>=0?'pos':'neg',
     sub:projVsGoal!==null?(projVsGoal>=0?'▲ '+fmtK(projVsGoal)+' above goal':'▼ '+fmtK(Math.abs(projVsGoal))+' below goal'):'Avg: '+fmt(dailyAvg)+'/day'},
    {label:'Monthly Goal',    value:fmt(Math.round(coMonthlyGoal)), cls:''},
    {label:'Monthly Revenue', value:fmt(coMonthlyRev), cls:mDiff>=0?'pos-c':'neg-c', vc:mDiff>=0?'pos':'neg'},
    {label:'Monthly +/–',     value:(mDiff>=0?'+':'')+fmt(Math.round(mDiff)), cls:mDiff>=0?'pos-c':'neg-c', vc:mDiff>=0?'pos':'neg'},
  ].forEach(s=>{
    sb.innerHTML+=`<div class="sum-card ${s.cls}"><div class="sum-label">${s.label}</div><div class="sum-value ${s.vc||''}">${s.value}</div>${s.sub?`<div class="sum-sub">${s.sub}</div>`:''}</div>`;
  });

  // Table heads built per-page in buildTableHead()

  // ── TECH ROWS ──
  // Sort by monthly revenue descending
  const allTechs = [...liveData.techs].sort((a,b) => (b.monthlyRev||0) - (a.monthlyRev||0));

  // Holiday footer
  const mHols=new Set();
  weeks.forEach(wk=>holsInWeek(wk.dates,holMap).forEach(h=>mHols.add(h)));
  if(mHols.size) document.getElementById('footerNote').textContent=
    `⟳ Refreshes hourly  ·  🎌 Holidays this month: ${[...mHols].join(', ')}`;

  // ── SPLIT TECHS INTO PAGES ──
  // Page 1 shows up to MAX_PAGE1 (12) techs, page 2 gets the rest
  const page1Techs = allTechs.length > MAX_PAGE1 ? allTechs.slice(0, MAX_PAGE1) : allTechs;
  const page2Techs = allTechs.length > MAX_PAGE1 ? allTechs.slice(MAX_PAGE1) : [];

  // Build table headers for both pages
  function buildTableHead(headId) {
    const thead=document.getElementById(headId);
    if(!thead) return;
    let th='<th>#</th><th>Technician</th>';
    weeks.forEach((wk,i)=>{
      const isCur=i===curWkIdx;
      const wd=countWorkDays(wk.dates,holMap,null);
      const hols=holsInWeek(wk.dates,holMap);
      th+=`<th class="${isCur?'wkc':'wk'}">Week ${wk.weekNum}${hols.length?' 🎌':''}<br><span style="font-size:8px;font-weight:400;opacity:.7">${wd} work days</span></th>`;
    });
    th+='<th>Monthly Rev</th><th>Conv %</th><th class="ytdc">YTD Revenue</th>';
    thead.innerHTML=th;
  }
  buildTableHead('tableHead1');
  if(page2Techs.length > 0) buildTableHead('tableHead2');

  const tbody1=document.getElementById('techBody1'); if(tbody1) tbody1.innerHTML='';
  const tbody2=document.getElementById('techBody2'); if(tbody2) tbody2.innerHTML='';

  // Remove old single tableHead if present
  const oldHead=document.getElementById('tableHead');
  if(oldHead) oldHead.innerHTML='';

  function buildRow(t, i, globalRank) {
    const rank      = globalRank;
    const color     = COLORS[i % COLORS.length];
    const ytdRev    = t.ytdRev     || 0;
    const monthRev  = t.monthlyRev || 0;
    const conv      = t.convRate   || 0; // real data from ST via Google Sheet

    // YTD goal
    const ytdWD   = countYTDWorkDays(t.startDate, holMap, year);
    const ytdGoal = ytdWD !== null ? t.goal * ytdWD : null;
    const ytdDiff = ytdGoal !== null ? ytdRev - ytdGoal : null;
    const ytdCls  = ytdGoal === null ? 'val-muted' : ytdRev >= ytdGoal ? 'val-over' : 'val-under';
    const ytdFrom = t.startDate && new Date(t.startDate) > new Date(year,0,1) ? t.startDate : `${year}-01-01`;

    // Rank badge
    let rh;
    if(rank===1)rh=`<span class="rank-badge r1">🥇 1st</span>`;
    else if(rank===2)rh=`<span class="rank-badge r2">🥈 2nd</span>`;
    else if(rank===3)rh=`<span class="rank-badge r3">🥉 3rd</span>`;
    else rh=`<span class="rank-badge ro">${ordinal(rank)}</span>`;

    // Weekly cells — real data from Google Sheet via weeklyRev array
    let elGoal=0, wkCells='';

    weeks.forEach((wk,wi)=>{
      const isCur=wi===curWkIdx, isFut=wi>curWkIdx;
      const hols=holsInWeek(wk.dates,holMap);
      const holHtml=hols.length?`<br><span style="font-size:9px;color:#B45309">🎌 ${hols.join(', ')}</span>`:'';
      let wd=isFut?countWorkDays(wk.dates,holMap,null):isCur?countWorkDays(wk.dates,holMap,today):countWorkDays(wk.dates,holMap,null);
      const wkGoal=t.goal*wd;
      if(!isFut) elGoal+=wkGoal;

      // weeklyRev is 1-indexed: weeklyRev[1]=week1, weeklyRev[2]=week2 etc
      const rev = t.weeklyRev ? (t.weeklyRev[wk.weekNum] || 0) : 0;

      if(isFut){
        wkCells+=`<td${isCur?' class="cur-wk"':''}><div class="cell-wrap"><span class="cell-main val-muted">—</span><span class="cell-sub">Goal: ${fmt(wkGoal)}</span></div></td>`;
      } else if(rev===0){
        wkCells+=`<td${isCur?' class="cur-wk"':''}><div class="cell-wrap"><span class="cell-main val-muted">No data</span><span class="cell-sub">Goal: ${fmt(wkGoal)}</span>${holHtml}</div></td>`;
      } else {
        const cls=rev>=wkGoal?'val-over':'val-under';
        const diff=rev-wkGoal;
        wkCells+=`<td${isCur?' class="cur-wk"':''}><div class="cell-wrap"><span class="cell-main ${cls}">${fmt(rev)}</span><span class="cell-sub">${fmt(wkGoal)} · ${diff>=0?'+':''}${fmt(diff)}</span>${holHtml}</div></td>`;
      }
    });

    // Monthly rev color
    const mDiffT = monthRev - elGoal;
    const mCls   = monthRev === 0 ? 'val-muted' : mDiffT >= 0 ? 'val-over' : 'val-under';

    // Conv color
    const convCls = conv === 0 ? 'val-muted' : conv >= convGoal ? 'val-over' : 'val-under';

    // YTD cell
    const ytdHtml = ytdGoal === null
      ? `<div class="cell-wrap"><span class="ytd-main val-muted">No start date</span></div>`
      : `<div class="cell-wrap"><span class="ytd-main ${ytdCls}">${fmtK(ytdRev)}</span><span class="cell-sub">Goal: ${fmtK(ytdGoal)} · ${ytdDiff>=0?'+':''}${fmt(ytdDiff)}</span><span class="cell-sub">Since ${ytdFrom}</span></div>`;

    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${rh}</td>
      <td><div class="tech-cell">
        <div class="avatar" style="background:${color}18;color:${color};border:2px solid ${color}30">${initials(t.name)}</div>
        <div><span class="tname">${t.name}</span><span class="tgoal">Daily Goal: ${fmt(t.goal)}</span></div>
      </div></td>
      ${wkCells}
      <td><div class="cell-wrap"><span class="mrev-main ${mCls}">${monthRev>0?fmt(monthRev):'—'}</span>${monthRev>0?`<span class="cell-sub">${mDiffT>=0?'+':''}${fmt(mDiffT)} vs goal</span>`:''}</div></td>
      <td><div class="cell-wrap"><span class="conv-main ${convCls}">${conv>0?conv.toFixed(1)+'%':'—'}</span>${conv>0&&convGoal?`<span class="cell-sub">Goal: ${convGoal}%</span>`:''}</div></td>
      <td>${ytdHtml}</td>
    `;
    return tr;
  }

  // Build page 1 rows
  page1Techs.forEach((t,i)=>{
    const tr = buildRow(t, i, i+1);
    if(tbody1) tbody1.appendChild(tr);
  });

  // Build page 2 rows — rank continues from end of page 1
  page2Techs.forEach((t,i)=>{
    const tr = buildRow(t, i, MAX_PAGE1 + i + 1);
    if(tbody2) tbody2.appendChild(tr);
  });

  // Start page rotation
  if(pageTimer) clearTimeout(pageTimer);
  startPageRotation(allTechs.length);
}

// ── INIT ──
// Fetch live data then render, refresh every hour
async function init() {
  await fetchBoardData();
  render();
}

// ── COUNTDOWN ──
let secs=3600;
function tick(){
  const m=String(Math.floor(secs/60)).padStart(2,'0');
  const s=String(secs%60).padStart(2,'0');
  document.getElementById('countdown').textContent=`${m}:${s}`;
  if(--secs<0){
    secs=3600;
    // Refetch data and re-render every hour
    fetchBoardData().then(()=>render());
  }
}

init();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
